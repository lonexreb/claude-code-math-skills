name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: install minimal deps for tests
        run: |
          python -m pip install --upgrade pip
          # Tests only need sympy + numpy + pytest. The full requirements.txt
          # pulls heavyweight PDF deps that aren't needed for CI.
          pip install pytest sympy numpy mpmath

      - name: compile-check harness
        run: |
          python -m py_compile harness/__init__.py \
                               harness/sympy_check.py \
                               harness/lean_stub.py \
                               harness/run_bench.py \
                               harness/proof_lint.py

      - name: pytest
        run: pytest -q

      - name: reference proofs lint clean
        run: |
          set -e
          fail=0
          for p in proofs/*.md; do
            case "$p" in proofs/README.md) continue;; esac
            out=$(python -m harness.proof_lint --proof "$p")
            high=$(python -c "import sys,json; r=json.loads(sys.argv[1]); print(r['summary']['CRITICAL']+r['summary']['HIGH'])" "$out")
            echo "$p — CRITICAL+HIGH=$high"
            if [ "$high" != "0" ]; then
              echo "FAIL: $p has $high CRITICAL/HIGH findings"
              echo "$out"
              fail=1
            fi
          done
          exit $fail

  validate-benchmarks:
    name: validate benchmark frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: lint problem files
        run: |
          python - <<'PY'
          import re, sys
          from pathlib import Path

          REQUIRED = {"id", "domain", "difficulty", "source"}
          fail = []
          for p in sorted(Path("benchmarks/problems").glob("*.md")):
              text = p.read_text()
              m = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              if not m:
                  fail.append(f"{p}: missing YAML frontmatter")
                  continue
              keys = {ln.split(":", 1)[0].strip()
                      for ln in m.group(1).splitlines() if ":" in ln}
              missing = REQUIRED - keys
              if missing:
                  fail.append(f"{p}: missing keys {sorted(missing)}")
              if "## Problem" not in text:
                  fail.append(f"{p}: missing '## Problem' section")
          if fail:
              for f in fail:
                  print("FAIL:", f)
              sys.exit(1)
          print("benchmarks: ok")
          PY

  validate-agents:
    name: validate .claude/agents frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: lint agent files
        run: |
          python - <<'PY'
          import re, sys
          from pathlib import Path

          REQUIRED = {"name", "description"}
          fail = []
          for p in sorted(Path(".claude/agents").glob("*.md")):
              text = p.read_text()
              m = re.match(r"^---\n(.*?)\n---", text, re.DOTALL)
              if not m:
                  fail.append(f"{p}: missing YAML frontmatter")
                  continue
              keys = {ln.split(":", 1)[0].strip()
                      for ln in m.group(1).splitlines() if ":" in ln}
              missing = REQUIRED - keys
              if missing:
                  fail.append(f"{p}: missing keys {sorted(missing)}")
          if fail:
              for f in fail:
                  print("FAIL:", f)
              sys.exit(1)
          print("agents: ok")
          PY
